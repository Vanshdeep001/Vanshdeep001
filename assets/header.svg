    </rect>
    <text x="94" y="51" font-family="'JetBrains Mono','Segoe UI',Arial,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#71717A">SOFTWARE ENGINEER &#8212; LUCKNOW, IN</text>

