<svg viewBox="0 0 1000 330" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Vansh Deep Srivastava">
  <rect x="0.5" y="0.5" width="999" height="329" rx="22" fill="#0B0B0F" stroke="#1A1A1F"/>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.15s" fill="freeze"/>
