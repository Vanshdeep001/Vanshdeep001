    <text x="70" y="232" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-weight="800" font-size="76" letter-spacing="-1" fill="none" stroke="#BEF264" stroke-width="1.4" textLength="430" lengthAdjust="spacingAndGlyphs">SRIVASTAVA</text>

    <rect x="72" y="260" height="3" rx="1.5" fill="#BEF264" width="0">
      <animate attributeName="width" from="0" to="400" dur="1.1s" begin="0.7s" fill="freeze"/>
    </rect>
    <text x="74" y="288" font-family="'JetBrains Mono','Segoe UI',Arial,sans-serif" font-size="12.5" font-weight="400" letter-spacing="3" fill="#8a8a92">FULL STACK&#160;&#160;/&#160;&#160;CLOUD &amp; DEVOPS&#160;&#160;/&#160;&#160;REAL-TIME SYSTEMS</text>
